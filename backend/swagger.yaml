openapi: 3.0.0
info:
  title: Complaint Management System API
  description: |
    A comprehensive API for managing municipal complaints with SLA tracking, employee assignment, and analytics.
    
    ## Features
    - Submit complaints with photo upload
    - Automatic employee assignment based on workload
    - SLA tracking and deadline management
    - Manager dashboard with department analytics
    - Employee complaint management
    - Heatmap data for geographic visualization
    
  version: 1.0.0
  contact:
    name: API Support
    email: piyushbanna06@gmail.com

servers:
  - url: https://nagarseva-backend.onrender.com
    description: Production server
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Health
    description: Health check endpoints
  - name: Complaints
    description: Complaint submission and management
  - name: User
    description: User-specific complaint queries
  - name: Manager
    description: Manager dashboard and department management
  - name: Employee
    description: Employee task management
  - name: Analytics
    description: System-wide analytics and statistics
  - name: SLA
    description: SLA tracking and violation management

paths:
  /:
    get:
      tags:
        - Health
      summary: Health check
      description: Check if the API server is running
      responses:
        '200':
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: Welcome to API with SLA Tracking
                  timestamp:
                    type: string
                    format: date-time

  /complaint:
    post:
      tags:
        - Complaints
      summary: Submit a new complaint
      description: |
        Submit a new complaint with optional photo. The system will:
        - Upload photo to cloud storage
        - Calculate SLA deadline based on department
        - Automatically assign to available employee (if any)
        - Set initial status as 'Pending' or 'In Progress'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplaintSubmission'
      responses:
        '200':
          description: Complaint submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Complaint submitted and assigned successfully
                  data:
                    type: object
                    properties:
                      Cid:
                        type: integer
                        description: Complaint ID
                        example: 42
                      photoUrl:
                        type: string
                        nullable: true
                        description: URL of uploaded photo
                        example: https://storage.example.com/complaints/photo.jpg
                      assignedTo:
                        type: string
                        nullable: true
                        description: Employee ID assigned to complaint
                        example: EMP_001
                      status:
                        type: string
                        example: In Progress
                      deadline:
                        type: string
                        format: date-time
                        description: SLA deadline for complaint resolution
                      slaStatus:
                        type: string
                        example: On Track
        '400':
          description: Bad request - missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /complaints/user/{userId}:
    get:
      tags:
        - User
      summary: Get all complaints by user
      description: Retrieve all complaints submitted by a specific user
      parameters:
        - name: userId
          in: path
          required: true
          description: User ID
          schema:
            type: string
            example: user_123abc
      responses:
        '200':
          description: List of user complaints
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Found 5 complaints.
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ComplaintDetails'
        '400':
          description: User ID is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /complaint/{id}:
    get:
      tags:
        - Complaints
      summary: Get complaint details by ID
      description: Retrieve detailed information about a specific complaint including employee details
      parameters:
        - name: id
          in: path
          required: true
          description: Complaint ID
          schema:
            type: integer
            example: 42
      responses:
        '200':
          description: Complaint details with employee information
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Complaint found successfully
                  data:
                    $ref: '#/components/schemas/ComplaintWithEmployee'
        '404':
          description: Complaint not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /complaint/toggle/{Cid}:
    patch:
      tags:
        - Complaints
      summary: Toggle complaint status
      description: |
        Toggle complaint status between 'In Progress' and 'Complete'.
        When marked complete:
        - Calculates time to resolve
        - Updates SLA status
        - Removes from employee's active tasks
        - Auto-assigns pending complaint if employee has capacity
      parameters:
        - name: Cid
          in: path
          required: true
          description: Complaint ID
          schema:
            type: integer
            example: 42
      responses:
        '200':
          description: Status toggled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Status changed from In Progress to Complete
                  data:
                    $ref: '#/components/schemas/ComplaintDetails'
                  autoAssignment:
                    type: object
                    nullable: true
                    description: Details of auto-assigned complaint (if any)
                    properties:
                      newComplaintId:
                        type: integer
                        example: 45
                      message:
                        type: string
                        example: Pending complaint #45 automatically assigned
        '404':
          description: Complaint not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /leaflet:
    get:
      tags:
        - Analytics
      summary: Get heatmap data
      description: Get coordinates of all pending complaints for heatmap visualization
      responses:
        '200':
          description: Heatmap coordinates
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Found 15 pending complaints with coordinates
                  count:
                    type: integer
                    example: 15
                  data:
                    type: array
                    description: Array of [latitude, longitude] pairs
                    items:
                      type: array
                      items:
                        type: number
                        format: float
                      minItems: 2
                      maxItems: 2
                      example: [26.2389, 78.1768]
                  details:
                    type: array
                    items:
                      type: object
                      properties:
                        Cid:
                          type: integer
                          example: 42
                        Latitude:
                          type: number
                          format: float
                          example: 26.2389
                        Longitude:
                          type: number
                          format: float
                          example: 78.1768

  /trigger-sla-check:
    post:
      tags:
        - SLA
      summary: Manually trigger SLA check
      description: |
        Manually check and update SLA status for all active complaints.
        Updates status based on time remaining:
        - Violated: Past deadline
        - Warning: Less than 6 hours remaining
        - On Track: More than 6 hours remaining
      responses:
        '200':
          description: SLA check completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: SLA check completed. 3 complaints updated.
                  updatedCount:
                    type: integer
                    example: 3
                  totalChecked:
                    type: integer
                    example: 25

  /manager/{Eid}/profile:
    get:
      tags:
        - Manager
      summary: Get manager profile
      description: Get profile information for a manager including department details
      parameters:
        - name: Eid
          in: path
          required: true
          description: Manager Employee ID
          schema:
            type: string
            example: MGR_001
      responses:
        '200':
          description: Manager profile with department information
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ManagerProfile'
        '404':
          description: Manager not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /manager/{Eid}/workers:
    get:
      tags:
        - Manager
      summary: Get department workers
      description: Get all employees working under the manager's department
      parameters:
        - name: Eid
          in: path
          required: true
          description: Manager Employee ID
          schema:
            type: string
            example: MGR_001
      responses:
        '200':
          description: List of workers in the department
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/EmployeeProfile'
                  count:
                    type: integer
                    example: 10

  /manager/{Eid}/complaints:
    get:
      tags:
        - Manager
      summary: Get department complaints
      description: Get all complaints in the manager's department
      parameters:
        - name: Eid
          in: path
          required: true
          description: Manager Employee ID
          schema:
            type: string
            example: MGR_001
      responses:
        '200':
          description: List of complaints in the department
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ComplaintDetails'
                  count:
                    type: integer
                    example: 50

  /manager/{Eid}/stats:
    get:
      tags:
        - Manager
      summary: Get department statistics
      description: Get comprehensive statistics for the manager's department
      parameters:
        - name: Eid
          in: path
          required: true
          description: Manager Employee ID
          schema:
            type: string
            example: MGR_001
      responses:
        '200':
          description: Department statistics with SLA metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/DepartmentStatistics'

  /manager/{Eid}/sla-violations:
    get:
      tags:
        - SLA
        - Manager
      summary: Get SLA violations for department
      description: Get all SLA violations and warnings in the manager's department
      parameters:
        - name: Eid
          in: path
          required: true
          description: Manager Employee ID
          schema:
            type: string
            example: MGR_001
      responses:
        '200':
          description: SLA violations categorized by status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      pendingViolations:
                        type: array
                        items:
                          $ref: '#/components/schemas/ComplaintDetails'
                      inProgressViolations:
                        type: array
                        items:
                          $ref: '#/components/schemas/ComplaintDetails'
                      warnings:
                        type: array
                        items:
                          $ref: '#/components/schemas/ComplaintDetails'
                  counts:
                    type: object
                    properties:
                      pendingViolations:
                        type: integer
                        example: 2
                      inProgressViolations:
                        type: integer
                        example: 3
                      warnings:
                        type: integer
                        example: 5
                      total:
                        type: integer
                        example: 10

  /manager/{Eid}/heatmap:
    get:
      tags:
        - Manager
        - Analytics
      summary: Get department heatmap data
      description: Get coordinates of all complaints in the manager's department for heatmap visualization
      parameters:
        - name: Eid
          in: path
          required: true
          description: Manager Employee ID
          schema:
            type: string
            example: MGR_001
      responses:
        '200':
          description: Heatmap data with intensity values
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    description: Array of [latitude, longitude, intensity]
                    items:
                      type: array
                      items:
                        type: number
                        format: float
                      minItems: 3
                      maxItems: 3
                      example: [26.2389, 78.1768, 1]
                  count:
                    type: integer
                    example: 25

  /manager/complaint/{Cid}:
    delete:
      tags:
        - Manager
      summary: Delete a complaint
      description: |
        Delete a complaint from the manager's department.
        Only complaints with status 'Pending' or 'In Progress' can be deleted.
        Automatically removes complaint from assigned employee's task list.
      parameters:
        - name: Cid
          in: path
          required: true
          description: Complaint ID
          schema:
            type: integer
            example: 42
        - name: managerId
          in: query
          required: true
          description: Manager's Employee ID for authorization
          schema:
            type: string
            example: MGR_001
      responses:
        '200':
          description: Complaint deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Complaint deleted successfully
        '403':
          description: Unauthorized or invalid status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Complaint not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /employee/{Eid}/complaints:
    get:
      tags:
        - Employee
      summary: Get employee's assigned complaints
      description: Get all complaints assigned to a specific employee with employee profile details
      parameters:
        - name: Eid
          in: path
          required: true
          description: Employee ID
          schema:
            type: string
            example: EMP_001
      responses:
        '200':
          description: List of assigned complaints with employee information
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ComplaintDetails'
                  employee:
                    $ref: '#/components/schemas/EmployeeProfile'
                  count:
                    type: integer
                    example: 5
        '404':
          description: Employee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /employee/{Eid}/sla-violations:
    get:
      tags:
        - SLA
        - Employee
      summary: Get employee's SLA violations
      description: Get all SLA violations and warnings for complaints assigned to the employee
      parameters:
        - name: Eid
          in: path
          required: true
          description: Employee ID
          schema:
            type: string
            example: EMP_001
      responses:
        '200':
          description: SLA violations categorized by severity
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      violations:
                        type: array
                        items:
                          $ref: '#/components/schemas/ComplaintDetails'
                      warnings:
                        type: array
                        items:
                          $ref: '#/components/schemas/ComplaintDetails'
                  counts:
                    type: object
                    properties:
                      violations:
                        type: integer
                        example: 1
                      warnings:
                        type: integer
                        example: 2
                      total:
                        type: integer
                        example: 3

  /analytics:
    get:
      tags:
        - Analytics
      summary: Get system-wide analytics
      description: Get comprehensive analytics for all complaints across all departments
      responses:
        '200':
          description: System-wide analytics with department breakdown
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  total:
                    type: object
                    properties:
                      complaints:
                        type: integer
                        example: 500
                      complete:
                        type: integer
                        example: 350
                      pending:
                        type: integer
                        example: 75
                      inProgress:
                        type: integer
                        example: 75
                  byDepartment:
                    type: object
                    properties:
                      water:
                        $ref: '#/components/schemas/DepartmentAnalytics'
                      electricity:
                        $ref: '#/components/schemas/DepartmentAnalytics'
                      publicInfrastructure:
                        $ref: '#/components/schemas/DepartmentAnalytics'
                      cleanliness:
                        $ref: '#/components/schemas/DepartmentAnalytics'

components:
  schemas:
    ComplaintSubmission:
      type: object
      required:
        - Name
        - Phone
        - Address
        - Department
        - Description
        - userId
      properties:
        Name:
          type: string
          description: Name of the person submitting complaint
          example: John Doe
        Phone:
          type: string
          description: Contact phone number
          example: '+911234567890'
        Address:
          type: string
          description: Location of the complaint
          example: 123 Main Street, City
        Department:
          type: string
          description: Department code
          enum: [DPT_W, DPT_E, DPT_PI, DPT_C]
          example: DPT_W
        Description:
          type: string
          description: Detailed description of the complaint
          example: Water pipe leakage on main road
        Latitude:
          type: number
          format: float
          description: GPS latitude coordinate
          example: 26.2389
          nullable: true
        Longitude:
          type: number
          format: float
          description: GPS longitude coordinate
          example: 78.1768
          nullable: true
        photoData:
          type: string
          description: Base64 encoded image data or data URI
          example: data:image/jpeg;base64,/9j/4AAQSkZJRg...
          nullable: true
        userId:
          type: string
          description: ID of the user submitting the complaint
          example: user_123abc

    ComplaintDetails:
      type: object
      description: Complete complaint information as stored in database
      properties:
        Cid:
          type: integer
          description: Unique complaint ID (Primary Key)
          example: 42
        Name:
          type: string
          description: Name of the person who submitted the complaint
          example: John Doe
        Phone:
          type: string
          description: Contact phone number
          example: '+911234567890'
        Address:
          type: string
          description: Location address of the complaint
          example: 123 Main Street, City
        Department:
          type: string
          description: Department code
          enum: [DPT_W, DPT_E, DPT_PI, DPT_C]
          example: DPT_W
        Description:
          type: string
          description: Detailed description of the issue
          example: Water pipe leakage on main road
        PhotoUrl:
          type: string
          nullable: true
          description: Cloud storage URL of the uploaded photo
          example: https://storage.example.com/complaints/photo.jpg
        Latitude:
          type: number
          format: float
          nullable: true
          description: GPS latitude coordinate
          example: 26.2389
        Longitude:
          type: number
          format: float
          nullable: true
          description: GPS longitude coordinate
          example: 78.1768
        userId:
          type: string
          description: ID of the user who submitted the complaint
          example: user_123abc
        Eid:
          type: string
          nullable: true
          description: Employee ID assigned to handle this complaint (Foreign Key)
          example: EMP_001
        WorkStatus:
          type: string
          enum: [Pending, In Progress, Complete]
          description: Current status of the complaint
          example: In Progress
        CreatedAt:
          type: string
          format: date-time
          description: Timestamp when complaint was created
          example: '2024-11-01T10:30:00Z'
        deadline:
          type: string
          format: date-time
          description: SLA deadline for complaint resolution
          example: '2024-11-03T10:30:00Z'
        slastatus:
          type: string
          enum: [On Track, Warning, Violated, Completed]
          description: Current SLA status
          example: On Track
        slaviolatedat:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when SLA was violated (if applicable)
          example: '2024-11-03T11:00:00Z'
        timetoresolve:
          type: string
          nullable: true
          description: Time taken to resolve the complaint
          example: 2 hours 30 minutes

    ComplaintWithEmployee:
      type: object
      description: Complaint details with joined employee information
      properties:
        WorkStatus:
          type: string
          enum: [Pending, In Progress, Complete]
          example: In Progress
        CreatedAt:
          type: string
          format: date-time
          example: '2024-11-01T10:30:00Z'
        Address:
          type: string
          example: 123 Main Street
        Eid:
          type: string
          nullable: true
          description: Assigned employee ID
          example: EMP_001
        Deadline:
          type: string
          format: date-time
          example: '2024-11-03T10:30:00Z'
        SLAStatus:
          type: string
          enum: [On Track, Warning, Violated, Completed]
          example: On Track
        SLAViolatedAt:
          type: string
          format: date-time
          nullable: true
          example: '2024-11-03T11:00:00Z'
        EmployeeName:
          type: string
          nullable: true
          description: Name of assigned employee (joined from EmployeeProfile)
          example: Jane Smith
        Department:
          type: string
          example: DPT_W

    EmployeeProfile:
      type: object
      description: Employee profile information
      properties:
        Eid:
          type: string
          description: Employee ID (Primary Key)
          example: EMP_001
        Name:
          type: string
          description: Employee full name
          example: Jane Smith
        DeptId:
          type: string
          description: Department ID (Foreign Key)
          example: DPT_W
        role:
          type: string
          enum: [manager, worker]
          description: Employee role in the system
          example: worker
        AssignCid:
          type: array
          description: Array of currently assigned complaint IDs
          items:
            type: integer
          example: [42, 45, 48]
        AssignHistory:
          type: array
          description: Historical record of all assigned complaint IDs
          items:
            type: integer
          example: [40, 41, 42, 43, 44, 45, 46, 47, 48]

    ManagerProfile:
      type: object
      description: Manager profile with department information
      properties:
        Eid:
          type: string
          description: Manager Employee ID
          example: MGR_001
        Name:
          type: string
          description: Manager full name
          example: John Manager
        DeptId:
          type: string
          description: Department ID
          example: DPT_W
        DepartmentName:
          type: string
          description: Full department name (joined from Department table)
          example: Water Department
        DepartmentCode:
          type: string
          description: Department code
          example: DPT_W
        role:
          type: string
          enum: [manager]
          example: manager

    Department:
      type: object
      description: Department configuration and SLA settings
      properties:
        DeptId:
          type: string
          description: Department ID (Primary Key)
          example: DPT_W
        DeptName:
          type: string
          description: Full department name
          example: Water Department
        Deadline:
          type: string
          format: date-time
          description: Default deadline configuration
          example: '2024-12-31T23:59:59Z'
        slahours:
          type: integer
          description: SLA hours for complaint resolution
          example: 48

    SLANotification:
      type: object
      description: SLA notification record
      properties:
        id:
          type: integer
          description: Notification ID (Primary Key)
          example: 1
        cid:
          type: integer
          description: Associated complaint ID (Foreign Key)
          example: 42
        eid:
          type: string
          description: Employee ID to notify (Foreign Key)
          example: EMP_001
        notificationtype:
          type: string
          enum: [warning, violation]
          description: Type of SLA notification
          example: warning
        message:
          type: string
          description: Notification message text
          example: Complaint #42 is approaching SLA deadline
        isread:
          type: boolean
          description: Whether notification has been read
          example: false
        createdat:
          type: string
          format: date-time
          description: When notification was created
          example: '2024-11-01T10:30:00Z'
        readat:
          type: string
          format: date-time
          nullable: true
          description: When notification was read
          example: null

    DepartmentStatistics:
      type: object
      description: Comprehensive department statistics
      properties:
        totalWorkers:
          type: integer
          description: Total number of employees in department
          example: 10
        totalComplaints:
          type: integer
          description: Total complaints for department
          example: 150
        pendingComplaints:
          type: integer
          description: Complaints awaiting assignment
          example: 20
        inProgressComplaints:
          type: integer
          description: Complaints currently being worked on
          example: 30
        completedComplaints:
          type: integer
          description: Resolved complaints
          example: 100
        sla:
          type: object
          properties:
            violations:
              type: integer
              description: Number of SLA violations
              example: 5
            warnings:
              type: integer
              description: Number of SLA warnings
              example: 10
            onTrack:
              type: integer
              description: Complaints on track
              example: 35
            complianceRate:
              type: string
              description: SLA compliance percentage
              example: '93.3'

    DepartmentAnalytics:
      type: object
      description: Department-level analytics summary
      properties:
        total:
          type: integer
          description: Total complaints in department
          example: 125
        complete:
          type: integer
          description: Completed complaints
          example: 90
        pending:
          type: integer
          description: Pending complaints
          example: 15
        inProgress:
